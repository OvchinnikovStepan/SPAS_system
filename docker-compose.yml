version: '3.8'

services:
  spas_api_app:
    image: spas_api_app
    container_name: spas_system_api
    build:
      context: .
      dockerfile: Dockerfile_api
    ports:
      - "${API_PORT:-8000}:8000"  # Внешний порт : внутренний порт (всегда 8000)
    env_file:
      - .env
    volumes:
      - .:/api/app
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=8000  # Фиксированный порт внутри контейнера

  spas_dashboard_app:
    image: spas_dashboard_app
    container_name: spas_system_dashboard
    build:
      context: .
      dockerfile: Dockerfile_dashboard
    ports:
      - "${DASHBOARD_PORT:-8501}:${DASHBOARD_PORT:-8501}"
    env_file:
      - .env
    volumes:
      - .:/dashboard
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=${DASHBOARD_PORT:-8501}

